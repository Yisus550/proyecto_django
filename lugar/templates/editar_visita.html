{% extends "base.html" %}
{% load django_bootstrap5 %}
{% block title %}Editar Visita{% endblock %}
{% block content %}
    <h2>Editar Visita</h2>
    <form method="post">
        {% csrf_token %}
        {% bootstrap_form form %}
        <button type="submit">Guardar Cambios</button>
    </form>
    <a href="{% url 'visitas' %}">Cancelar</a>
{% endblock %}
