{% extends "base.html" %}

{% block title %}Agregar Visita{% endblock %}

{% block content %}
<h2>Agregar Visita</h2>

<form method="post">
  {% csrf_token %} {{ form.as_p }}

  <div>
    <label for="id_lugar">Lugar*:</label>
    <select name="lugar" id="id_lugar" required>
        <option value="" selected disabled>-- Seleccione --</option>
      {% for l in lugares %}
        <option value="{{ l.id }}" {% if l.id == lugar.id %}selected{% endif %}>
          {{ l.nombre }}
        </option>
      {% endfor %}
    </select>
  </div>

  <div>
    <label for="fecha">Fecha*:</label>
    <input type="date" id="fecha" name="fecha" required>
  </div>

  <div>
    <label for="resena">Reseña*:</label>
    <textarea name="resena" id="resena" rows="5" cols="40"></textarea>
  </div>

  <div>
    <label for="calificacion">Calificación*:</label>
    <input type="number" id="calificacion" name="calificacion" min="1" max="5" value="4" required>
  </div>

  <div>
    <label for="platillo">Platillo:</label>
    <input type="text" id="platillo" name="platillo">
  </div>

  <button type="submit">Agregar Visita</button>
</form>
{% endblock %}
