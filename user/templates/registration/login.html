{% extends "base.html" %} 
{% load django_bootstrap5 %} 
{% block title %}Iniciar sesión{% endblock %} 
{% block content %}

<h2 class="text-center my-5">Iniciar sesión</h2>

<div class="container w-50">
  <div class="row">
    <div class="col">
      <form method="post">
        {% csrf_token %} {% bootstrap_form form %} {% if error %}
        <p style="color: red">{{ error }}</p>
        {% endif %}
        <div class="text-center">
            <button type="submit" class="btn btn-primary px-5 my-3">Entrar</button>
            <p>¿No tienes cuenta? <a href="{% url 'register' %}">Regístrate</a></p>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
