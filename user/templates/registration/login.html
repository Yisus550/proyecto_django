{% extends "base.html" %}
{% block title %}Iniciar sesión{% endblock %}
{% block content %}
    <h2>Iniciar sesión</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        {% if error %}<p style="color:red">{{ error }}</p>{% endif %}
        <button type="submit">Entrar</button>
    </form>
    <p>
        ¿No tienes cuenta? <a href="{% url 'register' %}">Regístrate</a>
    </p>
{% endblock %}
